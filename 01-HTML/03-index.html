<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice 003</title>
</head>
<body>
    <form action="">
        <h1>📝 Practice 3: Forms & Input Types</h1>
            <p>Is practice mein aap alag alag tarah ke input fields aur unke attributes ka istemal dekhenge.</p>
        
        <h2>1. Basic Registration Form</h2>
        <label for="fname">Full Name:</label><br>
        <input type="text" id="fname" name="username" placeholder="e.g, Shahbaz Ali"><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" placeholder="alqaab.com+tech@gmail.com"><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" placeholder="Minimum 8 characters"><br><br>

        <label for="age">Age (18-60):</label><br>
        <input type="number" id="age" name="age" value="22" min="18" max="60"><br><br>
        
        <label for="phone">Phone Number:</label><br>
        <input type="number" id="phone" name="Phone" placeholder="0326-1182021"><br><br>

        <label for="dob">Date of Birth:</label><br>
        <input type="date" name="date"><br><br>

        <label for="website">Personal Website:</label><br>
        <input type="text" id="website" name="website" placeholder="www.alqaab.com"><br><br>

        <label for="color">Favorite Color:</label>
        <input type="color" id="color" name="color" value="#000080"><br><br>

        <label for="experience">Experience (years):</label><br>
        <input type="range" id="experience" name="experience" min="0" max="20" step="1" value="3">3 <br><br>

        <label for="upload">Upload Resume (PDF):</label><br>
        <input type="file" id="upload"><br><br>
        
        <!-- Radio -->
         <span>Gender:</span><br>
         <input type="radio" id="male" name="gender" value="male">
         <label for="male">Male</label><br>

         <input type="radio" id="female" name="gender" value="female">
         <label for="female">Female</label><br>

         <input type="radio" id="other" name="gender" value="other">
         <label for="other">Other</label>
         <br><br>

         <!-- Skills -->
         <span>Skills:</span><br>
         <input type="checkbox" id="html" name="skills" value="html">
         <label for="html">HTML</label><br>

         <input type="checkbox" id="css" name="skills" value="css">
         <label for="css">CSS</label><br>

         <input type="checkbox" id="javascript" name="skills" value="javascript">
         <label for="javascript">JavaScript</label><br>

         <label for="country">Country:</label>
            <select name="country" id="country">
                    <optgroup label="Main Country">
                        <option value="pk">Pakistan</option>
                        <option value="us">Unites States</option>
                        <option value="iran">Iran</option>
                        <!-- sub -->
                        <optgroup label="Other Countrys"></optgroup>
                        <option value="sa">Saudi Arabia</option>
                        <option value="falasteen">Falasteen</option>
                        <option value="uk">United Kingdom</option>
                    </optgroup>
            </select>
    </form>

</body>
</html>
